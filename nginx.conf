# Reference Nginx config for WandB Clone on AWS EC2
# Place at: /etc/nginx/sites-available/mltracker
# Enable: sudo ln -s /etc/nginx/sites-available/mltracker /etc/nginx/sites-enabled/
# After certbot: sudo certbot --nginx -d yourdomain.com

server {
    listen 80;
    server_name yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name yourdomain.com;

    # TLS (filled in by certbot)
    # ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # Allow large image uploads (matches server-side 20 MB cap)
    client_max_body_size 20m;

    # Serve the Vue SPA static files directly (faster than Gunicorn)
    root /home/ubuntu/mltracker/frontend;
    index index.html;

    # API, auth, files, health, sdk → Gunicorn
    location ~ ^/(api|auth|files|health|sdk)(/|$) {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # SPA fallback — all other paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
