<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create account — MLTracker</title>
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #1a1a2e;
      color: #d0d8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #16213e;
      border: 1px solid #2a3a5e;
      border-radius: 12px;
      padding: 48px 40px;
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }

    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .logo-icon  { font-size: 40px; color: #e94560; }
    .logo-title { font-size: 22px; font-weight: 700; color: #e94560; letter-spacing: -0.3px; }
    .logo-sub   { font-size: 13px; color: #7080a0; text-align: center; line-height: 1.5; }

    .form-group {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .form-group input {
      width: 100%;
      padding: 10px 14px;
      background: #0f3460;
      border: 1px solid #2a3a5e;
      border-radius: 6px;
      color: #d0d8f0;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }

    .form-group input:focus { border-color: #e94560; }
    .form-group input::placeholder { color: #4a5a7a; }

    .btn-primary {
      width: 100%;
      padding: 11px 20px;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-primary:hover    { background: #2563eb; }
    .btn-primary:disabled { opacity: 0.6; cursor: default; }

    .error-msg {
      width: 100%;
      padding: 10px 14px;
      background: rgba(233,69,96,0.15);
      border: 1px solid rgba(233,69,96,0.4);
      border-radius: 6px;
      color: #e94560;
      font-size: 13px;
      display: none;
    }

    .error-msg.visible { display: block; }

    .success-box {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-align: center;
      display: none;
    }

    .success-box.visible { display: flex; }

    .success-icon {
      font-size: 48px;
      color: #22c55e;
    }

    .success-title {
      font-size: 18px;
      font-weight: 700;
      color: #d0d8f0;
    }

    .success-sub {
      font-size: 13px;
      color: #7080a0;
      line-height: 1.6;
    }

    .footer {
      display: flex;
      gap: 6px;
      font-size: 12px;
      color: #4a5a7a;
    }

    .footer a { color: #7080a0; text-decoration: none; }
    .footer a:hover { color: #d0d8f0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <i class="fa-solid fa-chart-line logo-icon"></i>
      <span class="logo-title">MLTracker</span>
      <span class="logo-sub">Create an account to start tracking experiments</span>
    </div>

    <div class="success-box" id="success-box">
      <i class="fa-solid fa-circle-check success-icon"></i>
      <span class="success-title">Account created!</span>
      <span class="success-sub">
        Your account is waiting for admin approval.<br>
        You'll be able to sign in once it's approved.
      </span>
      <a href="/auth/login" style="color:#7080a0;font-size:13px;text-decoration:none;">
        Back to sign in
      </a>
    </div>

    <div class="form-group" id="register-form">
      <input id="email"    type="email"    placeholder="Email"           autocomplete="email" />
      <input id="password" type="password" placeholder="Password (min 8 chars)" autocomplete="new-password" />
      <input id="confirm"  type="password" placeholder="Confirm password" autocomplete="new-password" />
      <div class="error-msg" id="error-msg"></div>
      <button class="btn-primary" id="register-btn" onclick="do_register()">Create account</button>
    </div>

    <div class="footer" id="footer-link">
      Already have an account? <a href="/auth/login">Sign in</a>
    </div>
  </div>

  <script>
    document.getElementById('confirm').addEventListener('keydown', e => {
      if (e.key === 'Enter') do_register();
    });

    function show_error(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.classList.add('visible');
    }

    async function do_register() {
      const btn      = document.getElementById('register-btn');
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;

      document.getElementById('error-msg').classList.remove('visible');

      if (!email)    { show_error('Please enter your email.'); return; }
      if (password.length < 8) { show_error('Password must be at least 8 characters.'); return; }
      if (password !== confirm) { show_error('Passwords do not match.'); return; }

      btn.disabled = true;
      btn.textContent = 'Creating account…';

      try {
        const res  = await fetch('/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) { show_error(data.error || 'Registration failed.'); return; }

        document.getElementById('register-form').style.display = 'none';
        document.getElementById('footer-link').style.display  = 'none';
        document.getElementById('success-box').classList.add('visible');
      } catch {
        show_error('Network error. Please try again.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create account';
      }
    }
  </script>
</body>
</html>
