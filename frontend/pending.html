<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Awaiting Approval — MLTracker</title>
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #1a1a2e;
      color: #d0d8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #16213e;
      border: 1px solid #2a3a5e;
      border-radius: 12px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }

    .icon { font-size: 52px; color: #f59e0b; }

    .title {
      font-size: 22px;
      font-weight: 700;
      color: #d0d8f0;
    }

    .body {
      font-size: 14px;
      color: #7080a0;
      line-height: 1.7;
    }

    .body strong { color: #d0d8f0; }

    .divider {
      width: 100%;
      border: none;
      border-top: 1px solid #2a3a5e;
    }

    .btn-outline {
      padding: 10px 24px;
      background: transparent;
      color: #7080a0;
      border: 1px solid #2a3a5e;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.15s, color 0.15s;
    }

    .btn-outline:hover { border-color: #7080a0; color: #d0d8f0; }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #e94560;
      font-weight: 700;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-row">
      <i class="fa-solid fa-chart-line"></i>
      MLTracker
    </div>

    <i class="fa-solid fa-clock icon"></i>

    <span class="title">Awaiting Approval</span>

    <p class="body">
      Your account has been created and is <strong>pending admin approval</strong>.<br><br>
      You'll be able to sign in as soon as an administrator reviews and approves your account.
      There's nothing more you need to do right now.
    </p>

    <hr class="divider" />

    <a class="btn-outline" href="/auth/logout">Back to sign in</a>
  </div>
</body>
</html>
